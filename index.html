<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLO KARL BERGER</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<link href="styles.css" rel="stylesheet">
</head>
<body tabindex="0">

  <!-- CRT effect layers -->
  <div id="crt-scanlines"></div>
  <div id="crt-vignette"></div>
  <div id="glitch"></div>

  <!-- Hidden measurement element for pixel-perfect indent -->
  <div id="measure"></div>

  <!-- Boot screen -->
  <div id="boot">
    <div id="boot-0" style="display:none">Testing SIGNAL...</div>
    <div id="boot-1" class="line" style="display:none">PAL &nbsp; AUTO &nbsp; TV</div>
    <div id="boot-2" class="line found" style="display:none">CHANNEL FOUND</div>
    <div id="boot-3" class="line" style="display:none">█</div>
  </div>

  <!-- Scroll container -->
  <div id="scroll">
    <div id="content">
      <!-- Rows are rendered dynamically by interaction.js -->
    </div>
    <div id="scroll-pad"></div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <div class="left">AUTO RENTAL:ON &nbsp; REPEAT:OFF</div>
    <div class="right" id="legend"></div>
  </div>

  <script src="interaction.js"></script>
</body>
</html>
